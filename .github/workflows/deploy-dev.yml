name: Deploy dev

# Every push to develop → build → unit tests → deploy to the dev service.
# Wild west: full app open, no e2e gate, scales to zero.
on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pipeline:
    uses: ./.github/workflows/_pipeline.yml
    with:
      environment: dev
      service_name: pickupflagfootball-dev
      app_base_url: https://dev.pickupflagfootball.com
      db_secret: pff-dev-database-url
      db_unpooled_secret: pff-dev-database-url-unpooled
      neon_parent_branch_id: br-purple-hall-a6k2m6m4    # dev branch (mime-ff project)
      # Stripe TEST mode on dev:
      stripe_secret_key_secret: pff-dev-stripe-secret-key
      stripe_webhook_secret_secret: pff-dev-stripe-webhook-secret
      stripe_price_id: price_1Tm8ah5dNONyK4ZWXwfedPnn      # test-mode price
      slack_webhook_secret: pff-dev-slack-webhook-url      # → #mime-ff-activity-feed-dev
      run_e2e: false
      min_instances: "0"
    secrets: inherit
