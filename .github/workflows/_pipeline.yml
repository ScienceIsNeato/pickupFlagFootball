name: pipeline (reusable)

# Reusable build → test → deploy pipeline, called by deploy-dev.yml (develop) and
# deploy-prod.yml (main). Everything env-specific comes in as inputs; the shared
# GCP project + the non-DB secret names live in the env block below.
on:
  workflow_call:
    inputs:
      environment:        { type: string, required: true }   # dev | production (GH environment + display)
      service_name:       { type: string, required: true }   # Cloud Run service
      app_base_url:       { type: string, required: false, default: "" }
      db_secret:          { type: string, required: true }   # Secret Manager name for DATABASE_URL
      db_unpooled_secret: { type: string, required: true }   # …for DATABASE_URL_UNPOOLED
      # Stripe per-env: dev → test keys/webhook/price, prod → live.
      stripe_secret_key_secret:     { type: string, required: true }   # …for STRIPE_SECRET_KEY
      stripe_webhook_secret_secret: { type: string, required: true }   # …for STRIPE_WEBHOOK_SECRET
      stripe_price_id:              { type: string, required: false, default: "" }  # donation price id (non-secret)
      slack_webhook_secret:         { type: string, required: false, default: "" }  # …for SLACK_WEBHOOK_URL (activity feed); unset = Slack off
      run_e2e:            { type: boolean, required: false, default: false } # full Playwright gate
      min_instances:      { type: string, required: false, default: "0" }
    secrets:
      GCP_SA_KEY:                     { required: false }
      GCP_SERVICE_ACCOUNT:            { required: false }
      GCP_WORKLOAD_IDENTITY_PROVIDER: { required: false }

env:
  PROJECT_ID: pickupflagfootball
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/pickupflagfootball/pickupflagfootball-images
  IMAGE_NAME: pickupflagfootball-app
  # Shared non-secret runtime config:
  BREVO_SENDER_EMAIL: support@pickupflagfootball.com
  BREVO_SENDER_NAME: Pickup Flag Football
  EMAIL_TRANSPORT: brevo
  NEXT_PUBLIC_SUPPORT_EMAIL: support@pickupflagfootball.com
  # Shared Secret Manager entry names (DB + Stripe secrets come in per-env as inputs):
  AUTH_SECRET_SECRET: pff-auth-secret
  AUTH_GOOGLE_ID_SECRET: pff-auth-google-id
  AUTH_GOOGLE_SECRET_SECRET: pff-auth-google-secret
  CRON_SECRET_SECRET: pff-cron-secret
  BREVO_API_KEY_SECRET: pff-brevo-api-key

jobs:
  test:
    runs-on: ubuntu-latest
    # Job budget sits above the e2e step's own timeout, so a hung suite is killed
    # at the STEP (leaving the job alive to upload evidence) rather than at the job.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Install Playwright browsers
        if: ${{ inputs.run_e2e }}
        run: npx playwright install --with-deps chromium
      # Desktop-only is the deploy gate. The desktop project already runs EVERY
      # scenario, including the @mobile-tagged ones (it shoots each beat at phone
      # width too). The separate Pixel-5 "mobile" project is a device-emulation
      # regression net that hangs deterministically on GitHub's runners at the
      # register→/play hop — a Playwright-emulation-×-runner artifact, NOT a
      # product bug (registration verified working on a real Pixel 8 Pro and under
      # local Playwright-mobile in ~1-2s). It runs non-blocking in e2e.yml on PRs
      # so we keep the signal without letting an emulation quirk red-line prod.
      - name: e2e (full stack — Postgres + Mailpit + Playwright)
        id: e2e
        if: ${{ inputs.run_e2e }}
        # Bounded here rather than only at the job level: a hang trips THIS step,
        # so the upload below still gets to run and capture the evidence.
        timeout-minutes: 30
        run: npm run test:e2e -- --project=desktop
      # always() + step outcome, not failure(): a step killed by its timeout, or a
      # cancelled run, won't reliably trip failure() — and those are exactly the
      # cases where the traces matter most. Upload whenever e2e didn't succeed.
      - name: Upload e2e traces + story report
        if: ${{ always() && inputs.run_e2e && steps.e2e.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts-${{ inputs.environment }}
          path: |
            tests/e2e/test-results/**
            tests/e2e/report/output/**
          retention-days: 7
          if-no-files-found: ignore

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate (Workload Identity Federation)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - name: Authenticate (service account key)
        if: ${{ !(env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with: { project_id: "${{ env.PROJECT_ID }}" }
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build image
        run: |
          # Pull the Sentry source-map upload token from Secret Manager if it
          # exists; tolerate its absence so builds work before it's created (the
          # build then just skips the upload). Passed as a BuildKit secret so it
          # never lands in an image layer.
          SENTRY_AUTH_TOKEN="$(gcloud secrets versions access latest \
            --secret=pff-sentry-auth-token --project="${{ env.PROJECT_ID }}" 2>/dev/null || true)"
          export SENTRY_AUTH_TOKEN
          DOCKER_BUILDKIT=1 docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_SUPPORT_EMAIL="${{ env.NEXT_PUBLIC_SUPPORT_EMAIL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT="${{ inputs.environment }}" \
            --build-arg CI=true \
            --secret id=sentry_auth_token,env=SENTRY_AUTH_TOKEN \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }} \
            .
      - name: Push image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    permissions: { contents: read, id-token: write }
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@v5
      - name: Authenticate (Workload Identity Federation)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - name: Authenticate (service account key)
        if: ${{ !(env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with: { project_id: "${{ env.PROJECT_ID }}" }
      - name: Verify required secrets exist
        run: |
          fail=0
          for s in \
            "${{ inputs.db_secret }}" "${{ inputs.db_unpooled_secret }}" \
            "${{ env.AUTH_SECRET_SECRET }}" "${{ env.AUTH_GOOGLE_ID_SECRET }}" \
            "${{ env.AUTH_GOOGLE_SECRET_SECRET }}" "${{ env.CRON_SECRET_SECRET }}" \
            "${{ inputs.stripe_secret_key_secret }}" "${{ inputs.stripe_webhook_secret_secret }}" \
            "${{ env.BREVO_API_KEY_SECRET }}"; do
            gcloud secrets versions access latest --secret="$s" --project="${{ env.PROJECT_ID }}" >/dev/null 2>&1 \
              || { echo "::error::Missing/inaccessible secret: $s"; fail=1; }
          done
          # Slack is optional: only require its secret when the input is set.
          if [ -n "${{ inputs.slack_webhook_secret }}" ]; then
            gcloud secrets versions access latest --secret="${{ inputs.slack_webhook_secret }}" --project="${{ env.PROJECT_ID }}" >/dev/null 2>&1 \
              || { echo "::error::Missing/inaccessible secret: ${{ inputs.slack_webhook_secret }}"; fail=1; }
          fi
          exit $fail
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Apply database migrations
        run: |
          DATABASE_URL_UNPOOLED="$(gcloud secrets versions access latest \
            --secret="${{ inputs.db_unpooled_secret }}" --project="${{ env.PROJECT_ID }}")" \
          node scripts/migrate.mjs apply
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service_name }} \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }} \
            --region=${{ env.REGION }} --platform=managed --allow-unauthenticated \
            --set-env-vars="^;^NODE_ENV=production;HOST=0.0.0.0;APP_BASE_URL=${{ inputs.app_base_url }};BREVO_SENDER_EMAIL=${{ env.BREVO_SENDER_EMAIL }};BREVO_SENDER_NAME=${{ env.BREVO_SENDER_NAME }};STRIPE_PRICE_ID=${{ inputs.stripe_price_id }};EMAIL_TRANSPORT=${{ env.EMAIL_TRANSPORT }};SENTRY_ENVIRONMENT=${{ inputs.environment }}" \
            --update-secrets="DATABASE_URL=${{ inputs.db_secret }}:latest,DATABASE_URL_UNPOOLED=${{ inputs.db_unpooled_secret }}:latest,AUTH_SECRET=${{ env.AUTH_SECRET_SECRET }}:latest,AUTH_GOOGLE_ID=${{ env.AUTH_GOOGLE_ID_SECRET }}:latest,AUTH_GOOGLE_SECRET=${{ env.AUTH_GOOGLE_SECRET_SECRET }}:latest,CRON_SECRET=${{ env.CRON_SECRET_SECRET }}:latest,STRIPE_SECRET_KEY=${{ inputs.stripe_secret_key_secret }}:latest,STRIPE_WEBHOOK_SECRET=${{ inputs.stripe_webhook_secret_secret }}:latest,BREVO_API_KEY=${{ env.BREVO_API_KEY_SECRET }}:latest" \
            --memory=512Mi --cpu=1 --min-instances=${{ inputs.min_instances }} --max-instances=10 \
            --project=${{ env.PROJECT_ID }}
      # Optional, additive: bind the Slack activity-feed webhook when configured.
      # Leaves the deploy above untouched; --update-secrets only adds this one.
      - name: Bind Slack webhook (optional)
        if: inputs.slack_webhook_secret != ''
        run: |
          gcloud run services update ${{ inputs.service_name }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --update-secrets="SLACK_WEBHOOK_URL=${{ inputs.slack_webhook_secret }}:latest"
      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ inputs.service_name }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          echo "$URL → HTTP $CODE"
          [ "$CODE" = "200" ] || { echo "::error::Smoke check failed"; exit 1; }
