name: Deploy prod

# Every push to main → build → unit + full e2e gate → deploy to prod.
# Protected: COMING_SOON=1 shows the splash until we flip it; clean prod DB.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pipeline:
    uses: ./.github/workflows/_pipeline.yml
    with:
      environment: production
      service_name: pickupflagfootball-prod
      app_base_url: https://pickupflagfootball.com
      coming_soon: "1"          # splash gate ON
      db_secret: pff-database-url
      db_unpooled_secret: pff-database-url-unpooled
      # Stripe LIVE mode on prod:
      stripe_secret_key_secret: pff-stripe-secret-key
      stripe_webhook_secret_secret: pff-stripe-webhook-secret
      stripe_price_id: price_1Tmqd97dX3bjywYI5k8NaeTU     # live-mode price
      run_e2e: true             # full Playwright gate before prod
      min_instances: "1"
    secrets: inherit
