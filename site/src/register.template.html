<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{{SEO_TITLE}}</title>
  <meta name="description" content="{{SEO_DESC}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav">
    <a href="index.html" class="brand">
      <span class="ball" aria-hidden="true">
        <svg viewBox="0 0 34 22" width="28" height="18">
          <ellipse cx="17" cy="11" rx="16" ry="10" fill="#8a4b2a"></ellipse>
          <path d="M7 11 H27" stroke="#fff" stroke-width="1.6"></path>
          <path d="M13 8 V14 M17 7.2 V14.8 M21 8 V14" stroke="#fff" stroke-width="1.6"></path>
        </svg>
      </span>
      {{BRAND}}
    </a>
    <nav>
      <a href="index.html#how">how it works</a>
      <a href="index.html#faq">faq</a>
    </nav>
  </header>

  <main class="reg">
    <a href="index.html" class="back">&larr; back</a>
    <h1 class="reg-h">{{REG_HEADING}}</h1>
    <p class="reg-blurb">{{REG_BLURB}}</p>
    <form class="reg-form" id="reg-form">
      <label>name
        <input type="text" name="name" placeholder="your name" autocomplete="name" required>
      </label>
      <label>email
        <input type="email" name="email" placeholder="you@email.com" autocomplete="email" required>
      </label>
      <label>zip
        <input type="text" name="zip" placeholder="52241" inputmode="numeric" autocomplete="postal-code" pattern="[0-9]{5}" required>
      </label>
      <button type="submit" class="btn-green">{{REG_CTA}}</button>
      <p class="reg-note">{{REG_NOTE}}</p>
    </form>
    <p class="reg-done" id="reg-done" hidden>thanks - this is a preview for now. real signups go live once the backend's wired up.</p>
  </main>

  <script>
    (function () {
      var f = document.getElementById('reg-form');
      if (!f) return;
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!f.reportValidity()) return;
        f.hidden = true;
        document.getElementById('reg-done').hidden = false;
      });
    })();
  </script>
</body>
</html>
