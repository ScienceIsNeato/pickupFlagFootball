  <canvas id="bg" aria-hidden="true"></canvas>
  <script>
    (function () {
      var c = document.getElementById('bg');
      if (!c) return;
      var ctx = c.getContext('2d');
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var COLORS = ['#f5c518', '#e2483f', '#2fb673', '#f59e2a'];
      var R = 150;
      var W, H, flags, mx = -9999, my = -9999, raf = null;

      function rand(a, b) { return a + Math.random() * (b - a); }

      function build() {
        W = window.innerWidth; H = window.innerHeight;
        c.width = W * dpr; c.height = H * dpr;
        c.style.width = W + 'px'; c.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        var n = Math.max(24, Math.min(90, Math.round((W * H) / 26000)));
        flags = [];
        for (var i = 0; i < n; i++) {
          flags.push({
            x: rand(0, W), y: rand(0, H),
            size: rand(7, 13),
            rot: rand(0, Math.PI * 2),
            phase: rand(0, Math.PI * 2),
            energy: 0,
            color: COLORS[(Math.random() * COLORS.length) | 0]
          });
        }
      }

      function drawFlag(f) {
        var L = f.size * 3, h = f.size * 0.5, seg = 6, i, t, x, w;
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rot);
        ctx.globalAlpha = 0.26 + 0.64 * f.energy;
        ctx.fillStyle = f.color;
        ctx.beginPath();
        for (i = 0; i <= seg; i++) {
          t = i / seg; x = t * L;
          w = Math.sin(f.phase + t * 6) * h * 1.2 * t * f.energy;
          if (i === 0) ctx.moveTo(x, w - h / 2); else ctx.lineTo(x, w - h / 2);
        }
        for (i = seg; i >= 0; i--) {
          t = i / seg; x = t * L;
          w = Math.sin(f.phase + t * 6) * h * 1.2 * t * f.energy;
          ctx.lineTo(x, w + h / 2);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function frame() {
        ctx.clearRect(0, 0, W, H);
        var active = false;
        for (var i = 0; i < flags.length; i++) {
          var f = flags[i];
          var dx = f.x - mx, dy = f.y - my, d = Math.sqrt(dx * dx + dy * dy);
          var target = (!reduce && d < R) ? (1 - d / R) : 0;
          f.energy += (target - f.energy) * 0.12;
          if (f.energy < 0.004) f.energy = 0;
          if (f.energy > 0.004) { f.phase += 0.25; active = true; }
          drawFlag(f);
        }
        raf = active ? requestAnimationFrame(frame) : null;
      }

      function wake() { if (!raf) raf = requestAnimationFrame(frame); }

      window.addEventListener('pointermove', function (e) { mx = e.clientX; my = e.clientY; wake(); });
      window.addEventListener('pointerleave', function () { mx = -9999; my = -9999; wake(); });
      window.addEventListener('resize', function () { build(); frame(); });

      build();
      frame();
    })();
  </script>
